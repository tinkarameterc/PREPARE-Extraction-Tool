services:

  postgres:
    image: postgres:18
    container_name: PREPARE-USAGI-POSTGRESQL
    restart: unless-stopped
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}

  adminer:
    image: adminer
    container_name: PREPARE-USAGI-ADMINER
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - default
    depends_on:
      - postgres
    environment:
      - ADMINER_DESIGN=pepa-linha-dark

  elasticsearch:
    image: elasticsearch:8.19.7
    container_name: PREPARE-USAGI-ELASTICSEARCH
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - app-es-data:/usr/share/elasticsearch/data
    networks:
      - prepare-usagi-public
      - default
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  backend:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    container_name: PREPARE-USAGI-BACKEND
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - prepare-usagi-public
      - default
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - EXTRACT_HOST=${EXTRACT_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - POSTGRES_SERVER=${POSTGRES_SERVER}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/check"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    build:
      context: ./backend

  frontend:
    image: '${DOCKER_IMAGE_FRONTEND?Variable not set}:${TAG-latest}'
    container_name: PREPARE-USAGI-FRONTEND
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - prepare-usagi-public
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_HOST=${BACKEND_HOST?Variable not set}
        - NODE_ENV=production

  bioner:
    build:
      context: ./bioner
    image: "${DOCKER_IMAGE_BIONER:-bioner}:${TAG:-latest}"
    container_name: PREPARE-USAGI-BIONER
    restart: unless-stopped
    ports:
      - "${BIONER_HOST_PORT:-5600}:${BIONER_PORT:-5600}"
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    env_file:
      - .env
    volumes:
      - ./bioner/models:/models:ro
      - ./bioner/model:/model:ro
    environment:
      - ENGINE=${BIONER_ENGINE?Variable not set}
      - MODEL=${BIONER_MODEL?Variable not set}
      - ADAPTER_MODEL=${BIONER_ADAPTER_MODEL}
      - HOST=${BIONER_HOST?Variable not set}
      - PORT=${BIONER_PORT?Variable not set}
      - USE_GPU=${BIONER_USE_GPU}
      - ADAPTER_PATH=${BIONER_ADAPTER_PATH}
      - PROMPTS_PATH=${BIONER_PROMPTS_PATH}
    networks:
      - prepare-usagi-public
      - default
    command:
      - python
      - -m
      - app.main
      - --engine
      - "${BIONER_ENGINE}"
      - --model
      - "${BIONER_MODEL}"
      - --adapter_model
      - "${BIONER_ADAPTER_MODEL}"
      - --host
      - "${BIONER_HOST}"
      - --port
      - "${BIONER_PORT}"
      - --use_gpu
      - "${BIONER_USE_GPU}"

volumes:
  app-db-data:
  app-es-data:

networks:
  prepare-usagi-public:
    # Set to true if the network is already created
    external: false